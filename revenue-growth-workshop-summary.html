  return JSON.parse(new TextDecoder().decode(pt));
}
function _jwt(t){try{const p=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(p))));}catch(e){return null;}}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const AV={accent:'#ff6b35',teal:'#1B998B',blue:'#00a0e0',purple:'#7b5ff0'};

function richStruct(s){return esc(s).replace(/(①|②|③)/g,'<b>$1</b>');}
function actRow(a){
  var cls=a.origin==='AI提案'?'ai':'done';
  var oc=a.origin==='AI提案'?'ai':'done';
  var meta='';
  if(a.owner){meta+='<span><b>担当</b> '+esc(a.owner)+'</span>';}
  if(a.deadline){meta+='<span><b>期限</b> '+esc(a.deadline)+'</span>';}
  if(a.decision){meta+='<span class="dec"><b>当日決定</b> '+esc(a.decision)+'</span>';}
  return '<div class="act-row '+cls+'">'+
    '<div class="act-top"><span class="act-origin '+oc+'">'+esc(a.origin)+'</span><span class="act-text">'+esc(a.text)+'</span></div>'+
    (meta?'<div class="act-metaline">'+meta+'</div>':'')+
  '</div>';
}
function buildNav(){
  var nav=document.querySelector('.sidenav');
  var links=[['top3','01','最重要3点'],['crosscut','02','横断の一手'],['speakers','03','発言者別'],['retention','04','リテンション'],['method','05','手法']];
  var html='<div class="brand">Firework<span class="em"> Japan</span></div><div class="sub2"></div>';
  links.forEach(function(l){html+='<a href="#'+l[0]+'"><span class="num">'+l[1]+'</span>'+l[2]+'</a>';});
  html+='<div class="back"><a href="./index.html">← Q3 OffSite トップ</a></div>'+
        '<div class="foot">🔒 CONFIDENTIAL<br>社内限定・暗号化</div>';
  nav.innerHTML=html;
  var m=window.__data&&window.__data.meta;if(m){nav.querySelector('.sub2').textContent='発表者 '+m.presenters+'名 / '+m.date;}
  var secs=[].slice.call(document.querySelectorAll('.section'));
  var as=[].slice.call(nav.querySelectorAll('a[href^="#"]'));
  function onScroll(){var y=window.scrollY+90,cur=0;secs.forEach(function(s,i){if(s.offsetTop<=y)cur=i;});
    as.forEach(function(a,i){a.classList.toggle('active',i===cur);});}
  window.addEventListener('scroll',onScroll,{passive:true});onScroll();
}

// ===== SSO gate =====
const SS_KEY='revgrowth_cred';
const SSO_TTL_MS=2592000000;/*30d*/
function showData(d){window.__data=d;render(d);document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';}
function tryToken(credential,fromCache){
  return (async()=>{
    const info=_jwt(credential);const now=Math.floor(Date.now()/1000);
    const dom=info&&(info.hd||((info.email||'').split('@')[1])||'');
    const ok=fromCache?!!(info&&dom==='fireworkhq.com'&&info.aud===CLIENT_ID):!!(info&&dom==='fireworkhq.com'&&info.aud===CLIENT_ID&&(!info.exp||info.exp>now));
    if(!ok){try{localStorage.removeItem(SS_KEY);localStorage.removeItem(SS_KEY+'_exp');}catch(_){}
      if(!fromCache){document.getElementById('err').textContent='アクセス権がありません（@fireworkhq.com のみ）';}return false;}
    try{const d=await decrypt(PP);showData(d);try{localStorage.setItem(SS_KEY,credential);localStorage.setItem(SS_KEY+'_exp',String(Date.now()+SSO_TTL_MS));}catch(e){}return true;}
    catch(e){if(!fromCache){document.getElementById('err').textContent='描画に失敗しました: '+(e&&e.message?e.message:e);console.error(e);}return false;}
  })();
}
function onCredential(resp){document.getElementById('err').textContent='認証中…';tryToken(resp.credential,false);}
function initGoogle(){
  if(!window.google||!google.accounts){document.getElementById('err').textContent='Googleログインを読み込めませんでした。再読み込みしてください';return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:onCredential,hd:'fireworkhq.com',auto_select:true});
  google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'filled_blue',size:'large',text:'signin_with',shape:'pill',width:280});
  google.accounts.id.prompt();
}
window.onload=function(){
  let cached=null;try{const _e=localStorage.getItem(SS_KEY+'_exp');if(_e&&Date.now()<parseInt(_e,10)){cached=localStorage.getItem(SS_KEY);}else{localStorage.removeItem(SS_KEY);localStorage.removeItem(SS_KEY+'_exp');}}catch(e){}
  if(cached){document.getElementById('err').textContent='読み込み中…';tryToken(cached,true).then(ok=>{if(!ok)initGoogle();});}
  else{initGoogle();}
};
