/* sidebar */
.sidenav{position:fixed;top:0;left:0;bottom:0;width:220px;background:#13132a;color:#cdd3e0;padding:22px 14px;overflow-y:auto;z-index:60;border-right:1px solid #23233f}
.sidenav .brand{font-size:.84rem;font-weight:900;color:#fff;letter-spacing:.02em;line-height:1.32}
.sidenav .brand .em{color:#ff6b35}
.sidenav .sub2{font-size:.62rem;color:#7b84a0;margin:5px 0 18px}

.sidenav a:hover{background:#1e1e3a;color:#fff}
.sidenav a.active{background:#1e1e3a;color:#fff;border-left-color:#ff6b35;font-weight:700}
.sidenav .num{color:#6c7596;font-size:.66rem;flex:0 0 16px}
.sidenav .back{margin-top:14px;padding-top:14px;border-top:1px solid #23233f}
.sidenav .back a{color:#7b84a0;font-size:.7rem}
.sidenav .foot{margin-top:18px;padding-top:14px;border-top:1px solid #23233f;font-size:.58rem;color:#5f6884;line-height:1.6}
/* hero */
.hero{position:relative;min-height:34vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:52px 24px;background:#111;color:#fff;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 50%,rgba(255,107,53,.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(0,198,255,.07) 0%,transparent 50%);animation:float 20s ease-in-out infinite}

.hero-content{position:relative;z-index:1;max-width:820px}
.hero-logo{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:18px}
.hero-title{font-size:clamp(24px,4.4vw,40px);font-weight:900;line-height:1.3;margin-bottom:14px}
.hero-title span{background:linear-gradient(90deg,#ff6b35,#00c6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{font-size:clamp(13px,2vw,16px);font-weight:300;color:rgba(255,255,255,.72);margin-bottom:22px}
.hero-meta{display:flex;gap:26px;flex-wrap:wrap;justify-content:center}
.meta-item{display:flex;align-items:center;gap:9px;font-size:14px;color:rgba(255,255,255,.9)}
.meta-icon{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px}
.hero-note{margin-top:20px;font-size:11.5px;color:rgba(255,255,255,.45);max-width:640px;line-height:1.7}
/* section */
.section{max-width:1000px;margin:0 auto;padding:54px 24px}
.section-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#ff6b35;font-weight:700;margin-bottom:12px}
.section-title{font-size:clamp(21px,3.4vw,30px);font-weight:700;margin-bottom:14px;line-height:1.3;color:#111}
.section-desc{font-size:14.5px;color:#555;margin-bottom:30px;max-width:760px}
/* structural note */
.struct{background:#13132a;color:#dfe3ee;border-radius:14px;padding:22px 26px;margin-bottom:34px;font-size:14px;line-height:1.85;border-left:4px solid #ff6b35}
.struct b{color:#ffb488}
/* top3 card */
.t3{background:#fff;border-radius:16px;box-shadow:0 6px 28px rgba(0,0,0,.09);margin-bottom:26px;overflow:hidden;border-top:5px solid #ff6b35}
.t3-head{padding:24px 28px 18px;background:linear-gradient(180deg,#fff8f3,#fff)}
.t3-rank{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.t3-badge{width:40px;height:40px;border-radius:11px;background:#111;color:#fff;font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t3-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#ff6b35;background:#fff0e8;padding:4px 12px;border-radius:999px}
.t3-title{font-size:clamp(18px,2.6vw,23px);font-weight:900;color:#111;line-height:1.35}
.t3-one{font-size:14.5px;color:#b34a1f;font-weight:700;margin-top:10px;line-height:1.7}
.t3-body{padding:6px 28px 22px}
.t3-detail{font-size:14px;color:#3a3a3a;line-height:1.85;margin-bottom:16px}
.t3-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{font-size:12px;font-weight:700;color:#13132a;background:#eef0f6;border-radius:999px;padding:4px 12px}
.chip.who{background:#111;color:#fff}
.t3-verify{font-size:12.5px;color:#666;background:#f7f5f2;border-radius:9px;padding:11px 15px;margin-bottom:16px;border-left:3px solid #1B998B}
.t3-verify b{color:#1B998B}
.ev{list-style:none;margin:0 0 4px;padding:0}
.ev li{font-size:13px;color:#444;line-height:1.7;padding:8px 0 8px 20px;position:relative;border-bottom:1px dashed #ececec}
.ev li:last-child{border-bottom:none}
.ev li::before{content:'“';position:absolute;left:2px;top:6px;color:#ff6b35;font-weight:900;font-size:18px}
.ev-h{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#999;font-weight:700;margin:6px 0 4px}
/* action rows under each top3 */
.act-wrap{background:#faf7f3;border-top:1px solid #eee;padding:18px 28px 24px}
.act-h{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#111;font-weight:700;margin-bottom:14px}
.act-row{background:#fff;border-radius:11px;padding:15px 18px;margin-bottom:11px;box-shadow:0 3px 14px rgba(0,0,0,.05);border-left:4px solid #d8d0c8}
.act-row:last-child{margin-bottom:0}
.act-row.ai{border-left-color:#7b5ff0}
.act-row.done{border-left-color:#1B998B}
.act-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.act-origin{font-size:10.5px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:6px;flex-shrink:0;white-space:nowrap;margin-top:2px}
.act-origin.done{background:#e6f6ec;color:#1a8f52}
.act-origin.ai{background:#f1eefd;color:#6a4bd8}
.act-text{font-size:14px;color:#1a1a1a;font-weight:500;line-height:1.7}
.act-metaline{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;color:#666;padding-left:2px}
.act-metaline span{background:#f2efeb;border-radius:6px;padding:2px 10px}
.act-metaline b{color:#333;font-weight:700}
.act-metaline .dec{background:#fff2cc;color:#8a6d1a}

.cc p{font-size:14px;line-height:1.8;color:#bfe3da;margin-bottom:16px}

.cc-item .d{color:#1fd9b8;flex-shrink:0;font-weight:900}

.sp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}

.sp-head{display:flex;align-items:center;gap:11px;margin-bottom:6px}

.sp-role{font-size:11.5px;color:#888;font-weight:500}
.sp-theme{font-size:13px;font-weight:700;color:#b34a1f;margin:6px 0 10px;line-height:1.5}
.sp-sum{font-size:13.5px;color:#3a3a3a;line-height:1.8;margin-bottom:10px}

.sp-why::before{content:'なぜ ';font-weight:700;color:#999;font-size:10.5px;letter-spacing:1px}

.t4-pt{font-size:13.5px;color:#3a3a3a;line-height:1.8;margin-bottom:11px;padding-left:16px;position:relative}
.t4-pt::before{content:'';position:absolute;left:0;top:10px;width:7px;height:7px;border-radius:50%;background:#00a0e0}
.t4-pt b{color:#0072a8}
.t4-acth{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#0072a8;font-weight:700;margin:18px 0 12px}

.method{background:#13132a;color:#cdd3e0;border-radius:14px;padding:24px 28px;font-size:13.5px;line-height:1.85}
.method b{color:#ff9a6b}
.method .step{padding:6px 0;border-bottom:1px dashed #2b2b45}
.method .step:last-child{border-bottom:none}
.divider{max-width:1000px;margin:0 auto;height:1px;background:linear-gradient(90deg,transparent,#d8d0c8,transparent)}
.footer{text-align:center;padding:50px 24px;background:#111;color:rgba(255,255,255,.5);font-size:13px}
.footer-logo{font-size:17px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:8px}
.footer-updated{margin-top:12px;font-size:12px;color:rgba(255,255,255,.35)}
/* lock */
#lock{position:fixed;inset:0;background:#0d0d1a;display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.lockbox{max-width:420px;text-align:center;color:#e8ebf4}
.lockbox .em{font-size:46px;margin-bottom:14px}
.lockbox h1{font-size:22px;font-weight:900;margin-bottom:12px;color:#fff}
.lockbox p{font-size:13.5px;color:#9aa2bd;line-height:1.8;margin-bottom:22px}
.gwrap{display:flex;justify-content:center;min-height:44px}
.lockbox .err{color:#ff6b6b;font-size:12.5px;margin-top:14px;min-height:16px}
.lockbox .note{margin-top:26px;font-size:10px;letter-spacing:2px;color:#4a5068;font-family:'JetBrains Mono',monospace}
#app{display:none}
@media(max-width:900px){
  body{padding-left:0}
  .sidenav{position:sticky;top:0;left:auto;width:auto;height:auto;display:flex;gap:6px;overflow-x:auto;padding:10px 12px;border-right:none;border-bottom:1px solid #23233f;white-space:nowrap}
  .sidenav .brand,.sidenav .sub2,.sidenav .foot,.sidenav .num,.sidenav .back{display:none}
  .sidenav a{flex:0 0 auto;border-left:none;border-bottom:3px solid transparent;padding:7px 12px;margin:0;border-radius:6px}
  .sidenav a.active{border-left:none;border-bottom-color:#ff6b35}
  .sp-grid{grid-template-columns:1fr}
}
@media print{.sidenav{display:none}body{padding-left:0}#lock{display:none!important}#app{display:block!important}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}}

  return JSON.parse(new TextDecoder().decode(pt));
}
function _jwt(t){try{const p=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(p))));}catch(e){return null;}}

// ===== SSO gate =====
const SS_KEY='revgrowth_cred';
const SSO_TTL_MS=2592000000;/*30d*/
function showData(d){window.__data=d;render(d);document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';}
function tryToken(credential,fromCache){
  return (async()=>{
    const info=_jwt(credential);const now=Math.floor(Date.now()/1000);
    const dom=info&&(info.hd||((info.email||'').split('@')[1])||'');
    const ok=fromCache?!!(info&&dom==='fireworkhq.com'&&info.aud===CLIENT_ID):!!(info&&dom==='fireworkhq.com'&&info.aud===CLIENT_ID&&(!info.exp||info.exp>now));
    if(!ok){try{localStorage.removeItem(SS_KEY);localStorage.removeItem(SS_KEY+'_exp');}catch(_){}
      if(!fromCache){document.getElementById('err').textContent='アクセス権がありません（@fireworkhq.com のみ）';}return false;}
    try{const d=await decrypt(PP);showData(d);try{localStorage.setItem(SS_KEY,credential);localStorage.setItem(SS_KEY+'_exp',String(Date.now()+SSO_TTL_MS));}catch(e){}return true;}
    catch(e){if(!fromCache){document.getElementById('err').textContent='描画に失敗しました: '+(e&&e.message?e.message:e);console.error(e);}return false;}
  })();
}
function onCredential(resp){document.getElementById('err').textContent='認証中…';tryToken(resp.credential,false);}
function initGoogle(){
  if(!window.google||!google.accounts){document.getElementById('err').textContent='Googleログインを読み込めませんでした。再読み込みしてください';return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:onCredential,hd:'fireworkhq.com',auto_select:true});
  google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'filled_blue',size:'large',text:'signin_with',shape:'pill',width:280});
  google.accounts.id.prompt();
}
window.onload=function(){
  let cached=null;try{const _e=localStorage.getItem(SS_KEY+'_exp');if(_e&&Date.now()<parseInt(_e,10)){cached=localStorage.getItem(SS_KEY);}else{localStorage.removeItem(SS_KEY);localStorage.removeItem(SS_KEY+'_exp');}}catch(e){}
  if(cached){document.getElementById('err').textContent='読み込み中…';tryToken(cached,true).then(ok=>{if(!ok)initGoogle();});}
  else{initGoogle();}
};
